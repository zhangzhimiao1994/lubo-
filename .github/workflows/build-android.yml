name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Android build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake cmake git libffi-dev libltdl-dev \
            libncurses5-dev libncursesw5-dev libssl-dev libtool \
            openjdk-17-jdk pkg-config python3-pip python3-venv \
            unzip zip zlib1g-dev

      - name: Install Buildozer
        run: |
          echo "PYTHONUSERBASE=$GITHUB_WORKSPACE/.android-user" >> "$GITHUB_ENV"
          PYTHONUSERBASE="$GITHUB_WORKSPACE/.android-user" \
            python3 -m pip install --user --break-system-packages \
            "cython==0.29.34" \
            "buildozer @ git+https://github.com/kivy/buildozer.git"
          echo "$GITHUB_WORKSPACE/.android-user/bin" >> "$GITHUB_PATH"

      - name: Restore Android toolchain cache
        id: android-cache
        uses: actions/cache@v4
        with:
          path: |
            .android-build/project/.buildozer
            ~/.buildozer
          key: android-buildozer-${{ runner.os }}-${{ hashFiles('android/buildozer.spec') }}
          restore-keys: |
            android-buildozer-${{ runner.os }}-

      - name: Build debug APK
        id: build
        continue-on-error: true
        env:
          BUILDOZER: ${{ github.workspace }}/.android-user/bin/buildozer
        run: |
          set -o pipefail
          bash scripts/build_android.sh 2>&1 | tee android-build.log

      - name: Save Android toolchain cache
        if: always() && steps.android-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .android-build/project/.buildozer
            ~/.buildozer
          key: android-buildozer-${{ runner.os }}-${{ hashFiles('android/buildozer.spec') }}

      - name: Report Android build failure
        if: steps.build.outcome == 'failure'
        run: |
          log_tail="$(
            sed -E $'s/\033\\[[0-9;]*[mK]//g' android-build.log \
              | grep -vE '^(#     |export )[A-Za-z_][A-Za-z0-9_]* ?=' \
              | grep -vE '^\.{80,}$' \
              | tail -n 100
          )"
          log_tail="${log_tail//'%'/'%25'}"
          log_tail="${log_tail//$'\r'/'%0D'}"
          log_tail="${log_tail//$'\n'/'%0A'}"
          printf '::error title=Android build log::%s\n' "$log_tail"
          {
            echo '## Android build failure'
            echo '```text'
            tail -n 200 android-build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder-android-debug
          path: dist/android/DouyinLiveRecorder-android-debug.apk
          if-no-files-found: error
