name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FFmpeg
        shell: pwsh
        run: |
          if (-not (Get-Command ffmpeg -ErrorAction SilentlyContinue)) {
            choco install ffmpeg --no-progress -y
          }
          $ffmpegPath = Join-Path $env:ChocolateyInstall `
            "lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe"
          if (-not (Test-Path -LiteralPath $ffmpegPath -PathType Leaf)) {
            throw "Chocolatey FFmpeg binary was not found: $ffmpegPath"
          }
          "FFMPEG_PATH=$ffmpegPath" | Out-File `
            -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare Windows build environment
        shell: pwsh
        run: scripts/build_windows.ps1 -PrepareOnly -PythonExe (Get-Command python).Source

      - name: Build Windows app
        id: windows-build
        timeout-minutes: 12
        continue-on-error: true
        shell: pwsh
        run: |
          scripts/build_windows.ps1 -SkipInstall `
            -PythonExe (Get-Command python).Source *>&1 |
            Tee-Object -FilePath windows-build.log

      - name: Report Windows build failure
        if: steps.windows-build.outcome == 'failure'
        shell: pwsh
        run: |
          $logTail = (Get-Content windows-build.log -Tail 30) -join "`n"
          $logTail = $logTail.Replace('%', '%25')
          $logTail = $logTail.Replace("`r", '%0D').Replace("`n", '%0A')
          Write-Output "::error title=Windows build log::$logTail"
          exit 1

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder-windows
          path: dist/DouyinLiveRecorder
          if-no-files-found: error

  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgl1 libgles2 libmtdev1 xvfb

      - name: Build Linux app
        id: linux-build
        continue-on-error: true
        env:
          PYTHON: ${{ env.pythonLocation }}/bin/python
        run: |
          set -o pipefail
          xvfb-run -a -s "-screen 0 1280x720x24" \
            bash scripts/build_linux.sh 2>&1 | tee linux-build.log

      - name: Report Linux build failure
        if: steps.linux-build.outcome == 'failure'
        run: |
          log_tail="$(
            sed -E $'s/\033\\[[0-9;]*[mK]//g' linux-build.log \
              | tail -n 30
          )"
          log_tail="${log_tail//'%'/'%25'}"
          log_tail="${log_tail//$'\r'/'%0D'}"
          log_tail="${log_tail//$'\n'/'%0A'}"
          printf '::error title=Linux build log::%s\n' "$log_tail"
          exit 1

      - name: Upload Linux app
        uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder-linux
          path: dist/DouyinLiveRecorder
          if-no-files-found: error
