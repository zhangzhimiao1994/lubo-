name: Lubo 功能建议
description: 提议一个明确的问题和可验证的改进
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: 请先[搜索现有 issue](https://github.com/zhangzhimiao1994/lubo-/issues?q=is%3Aissue)，避免重复提议。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 issue，未发现相同建议。
          required: true
        - label: 此建议不要求绕过平台访问控制或风控。
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述当前工作流中的具体限制，不要填写 Cookie 或私人直播地址。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望行为、适用平台和可以验证的结果。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
