name: Lubo Bug 报告
description: 报告可复现的 Lubo 缺陷
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 请先[搜索现有 issue](https://github.com/zhangzhimiao1994/lubo-/issues?q=is%3Aissue)，并移除 Cookie、签名参数、代理凭据和私人路径。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 issue，未发现相同问题。
          required: true
        - label: 我已从日志和截图中移除敏感信息。
          required: true
  - type: dropdown
    id: platform
    attributes:
      label: 运行平台
      options:
        - Windows
        - Linux
        - Android
    validations:
      required: true
  - type: dropdown
    id: service
    attributes:
      label: 直播平台
      options:
        - Douyin / 抖音
        - Bilibili Live / B站直播
        - Huya / 虎牙
        - Douyu / 斗鱼
        - 与平台无关
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Lubo 版本或 commit
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: 说明输入、操作、预期结果和实际结果。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 已脱敏的日志
      render: shell
